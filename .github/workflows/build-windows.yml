name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-app/src-tauri

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build terse-uia.exe
        run: |
          dotnet publish windows-app\helpers\terse-uia\terse-uia.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o windows-app\helpers\ `
            -v normal 2>&1

      - name: Verify terse-uia.exe
        run: |
          $size = (Get-Item "windows-app/helpers/terse-uia.exe").Length
          Write-Host "terse-uia.exe size: $size bytes"
          if ($size -lt 100000) { throw "terse-uia.exe too small — build may have failed" }

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install Node.js (for frontend assets)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert icon to .ico
        run: |
          $dst = "windows-app/src-tauri/icons/icon.ico"
          if (-not (Test-Path $dst)) {
            magick "windows-app/src-tauri/icons/icon.png" `
              -define icon:auto-resize=256,128,64,48,32,16 `
              $dst
            Write-Host "icon.ico created via ImageMagick"
          } else {
            Write-Host "icon.ico already exists"
          }

      - name: Build Tauri Windows installer
        run: |
          cd windows-app\src-tauri
          cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Find and list installer
        run: |
          $bundles = Get-ChildItem -Recurse "windows-app\src-tauri\target" -Include "*.exe","*.msi" |
            Where-Object { $_.FullName -match "bundle" }
          if ($bundles) {
            $bundles | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          } else {
            Write-Host "No bundle files found — listing target dir:"
            Get-ChildItem -Recurse "windows-app\src-tauri\target\x86_64-pc-windows-msvc\release" -Depth 3 | Select-Object FullName
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Terse-Windows-Installer
          path: |
            windows-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            windows-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3.1
          name: Terse v1.3.1
          draft: false
          prerelease: false
          files: |
            windows-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            windows-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
