<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <div class="titlebar-left">
      <div class="status-dot" id="statusDot"></div>
      <span class="app-title">Terse</span>
      <span class="tracking-label" id="trackingLabel"></span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btnSettings" title="Settings">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="titlebar-btn" id="btnClose" title="Hide">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div id="app">
    <!-- Sessions list -->
    <div id="sessionsView">
      <div class="section-header">
        <span>Connected Sessions</span>
        <button id="btnAddSession" class="add-btn" title="Add connection">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <div id="sessionsList" class="sessions-list">
        <!-- Sessions populate here -->
      </div>

      <div id="emptyState" class="empty-state">
        <div class="idle-icon">T</div>
        <p class="idle-title">No connections yet</p>
        <p class="idle-sub">Click + to connect to a chat input</p>
      </div>

      <div class="idle-divider"><span>or paste below</span></div>
      <textarea id="manualInput" class="manual-area" placeholder="Paste a prompt to optimize..." spellcheck="false"></textarea>
      <button id="btnManualOpt" class="secondary-btn">Optimize</button>
    </div>

    <!-- PICK overlay -->
    <div id="pickOverlay" class="pick-overlay hidden">
      <div class="pick-anim"></div>
      <p class="pick-text">Click on a chat input area...</p>
      <p class="pick-sub">Terse will connect and monitor it live</p>
      <button id="btnCancelPick" class="ghost-btn">Cancel</button>
    </div>

    <!-- Manual result -->
    <div id="manualResult" class="hidden">
      <div class="connected-bar">
        <div class="conn-left"><div class="conn-dot manual"></div><span>Manual Optimize</span></div>
        <button id="btnBackToSessions" class="disc-btn">Back</button>
      </div>
      <div class="stats-strip">
        <span class="stat-tok" id="manStatBefore">0</span>
        <span class="stat-arrow">→</span>
        <span class="stat-tok accent" id="manStatAfter">0</span>
        <span class="stat-pct" id="manStatPct"></span>
      </div>
      <div id="manTechniques" class="techniques"></div>
      <textarea id="manText" class="live-text" spellcheck="false" readonly></textarea>
      <div class="action-pair">
        <button id="btnManCopy" class="copy-btn" title="Copy">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settingsPanel" class="hidden">
      <h3>Settings</h3>
      <div class="setting-group">
        <label class="setting-label">Aggressiveness</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-level="light">Light</button>
          <button class="toggle-btn active" data-level="balanced">Balanced</button>
          <button class="toggle-btn" data-level="aggressive">Aggressive</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-row"><span>Remove filler words</span><input type="checkbox" data-key="removeFillerWords" checked></label>
        <label class="setting-row"><span>Remove politeness</span><input type="checkbox" data-key="removePoliteness" checked></label>
        <label class="setting-row"><span>Remove hedging</span><input type="checkbox" data-key="removeHedging" checked></label>
        <label class="setting-row"><span>Remove meta-language</span><input type="checkbox" data-key="removeMetaLanguage" checked></label>
        <label class="setting-row"><span>Shorten phrases</span><input type="checkbox" data-key="shortenPhrases" checked></label>
        <label class="setting-row"><span>Simplify vocabulary</span><input type="checkbox" data-key="simplifyInstructions" checked></label>
        <label class="setting-row"><span>Remove redundancy</span><input type="checkbox" data-key="removeRedundancy" checked></label>
        <label class="setting-row"><span>Compress whitespace</span><input type="checkbox" data-key="compressWhitespace" checked></label>
        <label class="setting-row"><span>Compress code</span><input type="checkbox" data-key="compressCodeBlocks" checked></label>
      </div>
      <button id="btnCloseSettings" class="secondary-btn">Done</button>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
