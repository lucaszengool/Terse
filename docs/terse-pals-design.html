r<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse Pals</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;font-family:-apple-system,'Helvetica Neue',sans-serif;}
header{text-align:center;padding:56px 24px 44px;}
h1{font-size:2rem;font-weight:800;color:#111;letter-spacing:-.5px;}
.sub{font-size:.88rem;color:#aaa;margin-top:6px;}
.wrap{max-width:1140px;margin:0 auto;padding:0 20px 72px;}
.sh{font-size:.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#ccc;margin-bottom:18px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:56px;}
.card{background:#fff;border-radius:22px;padding:16px 8px 14px;text-align:center;
      box-shadow:0 1px 8px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);cursor:pointer;}
.pal{display:inline-block;will-change:transform;transform-origin:center bottom;}
.cname{font-size:.80rem;font-weight:700;color:#222;margin-top:6px;}
.csub{font-size:.66rem;color:#ccc;margin-top:1px;}

/* ── idle animations ──────────────────────────────────────────────── */
@keyframes axie-drift{
  0%  {transform:translate(0,0) rotate(0)}
  20% {transform:translate(4px,-9px) rotate(3.5deg)}
  45% {transform:translate(1px,-12px) rotate(0)}
  65% {transform:translate(-5px,-7px) rotate(-3.5deg)}
  85% {transform:translate(-2px,-3px) rotate(-1deg)}
  100%{transform:translate(0,0) rotate(0)}
}
@keyframes capy-zen{
  0%,100%{transform:translateY(0) rotate(0)}
  50%    {transform:translateY(-2px) rotate(.3deg)}
}
@keyframes shibu-zoomies{
  0%,100%{transform:translateY(0) rotate(0)}
  10%    {transform:translateY(-13px) rotate(-7deg)}
  22%    {transform:translateY(-20px) rotate(7deg)}
  34%    {transform:translateY(-14px) rotate(-5deg)}
  46%    {transform:translateY(-19px) rotate(5deg)}
  60%    {transform:translateY(-9px) rotate(-2deg)}
  76%    {transform:translateY(-3px) rotate(1deg)}
}
@keyframes roro-tumble{
  0%,100%{transform:translateY(0) rotate(0)}
  25%    {transform:translateY(-13px) rotate(-9deg)}
  50%    {transform:translateY(-16px) rotate(0)}
  75%    {transform:translateY(-12px) rotate(9deg)}
}
@keyframes waddle-toe{
  0%,100%{transform:rotate(-11deg) translateY(1px)}
  50%    {transform:rotate(11deg) translateY(1px)}
}
@keyframes quack-bob{
  0%,100%{transform:translateY(0) rotate(0)}
  18%    {transform:translateY(-8px) rotate(-10deg)}
  45%    {transform:translateY(-5px) rotate(0)}
  68%    {transform:translateY(-8px) rotate(10deg)}
}
@keyframes mochi-loaf{
  0%,100%{transform:scale(1,1)}
  35%    {transform:scale(1.05,.93)}
  65%    {transform:scale(1.07,.90)}
}
@keyframes frog-hop{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  10%    {transform:translateY(5px) scaleX(1.18) scaleY(.78)}
  28%    {transform:translateY(-26px) scaleX(.84) scaleY(1.18)}
  48%    {transform:translateY(4px) scaleX(1.14) scaleY(.82)}
  64%    {transform:translateY(-10px) scaleX(.93) scaleY(1.08)}
  82%    {transform:translateY(0) scaleX(1.03) scaleY(.97)}
}
@keyframes bun-hop{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  28%    {transform:translateY(-11px) rotate(-2deg) scaleX(.93) scaleY(1.08)}
  50%    {transform:translateY(-14px) rotate(0) scaleX(.91) scaleY(1.11)}
  70%    {transform:translateY(-9px) rotate(2deg) scaleX(.94) scaleY(1.07)}
  85%    {transform:translateY(2px) scaleX(1.07) scaleY(.92)}
}
@keyframes kuma-nap{
  0%,100%{transform:translateY(0) scale(1)}
  30%    {transform:translateY(-3px) scale(1.02,1)}
  55%    {transform:translateY(-5px) scale(1.03,.97)}
  75%    {transform:translateY(-3px) scale(1.02,1)}
}
@keyframes kitsune-play{
  0%,100%{transform:translateY(0) rotate(0)}
  6%     {transform:translateY(0) rotate(-17deg)}
  13%    {transform:translateY(0) rotate(17deg)}
  20%    {transform:translateY(0) rotate(-10deg)}
  27%    {transform:translateY(0) rotate(0)}
  42%    {transform:translateY(-13px) rotate(-3deg)}
  58%    {transform:translateY(-15px) rotate(3deg)}
  74%    {transform:translateY(-7px) rotate(0)}
}
@keyframes maru-munch{
  0%,100%{transform:rotate(0) scaleX(1)}
  12%    {transform:rotate(-5deg) scaleX(1.10)}
  25%    {transform:rotate(5deg) scaleX(.92)}
  38%    {transform:rotate(-5deg) scaleX(1.10)}
  50%    {transform:rotate(5deg) scaleX(.92)}
  62%    {transform:rotate(-2.5deg) scaleX(1.04)}
  75%    {transform:rotate(0) scaleX(1)}
}

/* ── idle animations (new 20) ──────────────────────────────────── */
@keyframes narwhal-drift{
  0%,100%{transform:translate(0,0) rotate(0)}
  22%    {transform:translate(-7px,-14px) rotate(-5deg)}
  45%    {transform:translate(2px,-18px) rotate(2deg)}
  68%    {transform:translate(6px,-10px) rotate(4deg)}
}
@keyframes corgi-trot{
  0%,100%{transform:translateY(0) rotate(0)}
  15%    {transform:translateY(-7px) rotate(-4deg)}
  30%    {transform:translateY(-3px) rotate(0)}
  45%    {transform:translateY(-8px) rotate(4deg)}
  60%    {transform:translateY(-3px) rotate(0)}
}
@keyframes sheep-graze{
  0%,55%,100%{transform:translateY(0) rotate(0)}
  70%        {transform:translateY(5px) rotate(-4deg)}
  85%        {transform:translateY(6px) rotate(-5deg)}
}
@keyframes persian-purr{
  0%,100%{transform:scale(1,1)}
  38%    {transform:scale(1.05,.93)}
  68%    {transform:scale(.96,1.04)}
}
@keyframes tanuki-waddle{
  0%,100%{transform:translateY(0) rotate(0)}
  25%    {transform:translateY(-9px) rotate(-8deg)}
  50%    {transform:translateY(-13px) rotate(0)}
  75%    {transform:translateY(-9px) rotate(8deg)}
}
@keyframes deer-prance{
  0%,100%{transform:translateY(0) rotate(0)}
  20%    {transform:translateY(-16px) rotate(-3deg)}
  40%    {transform:translateY(-20px) rotate(0)}
  60%    {transform:translateY(-16px) rotate(3deg)}
  80%    {transform:translateY(-5px) rotate(0)}
}
@keyframes nemu-nap{
  0%,100%{transform:translateY(0) scale(1)}
  45%    {transform:translateY(-2px) scale(1.03,.96)}
}
@keyframes koi-swim{
  0%,100%{transform:translateX(0) rotate(0)}
  22%    {transform:translateX(-9px) rotate(-7deg)}
  44%    {transform:translateX(5px) rotate(5deg)}
  66%    {transform:translateX(10px) rotate(7deg)}
  84%    {transform:translateX(-4px) rotate(-3deg)}
}
@keyframes arctic-play{
  0%,100%{transform:translateY(0) rotate(0)}
  14%    {transform:translateY(-11px) rotate(-14deg)}
  30%    {transform:translateY(-7px) rotate(10deg)}
  46%    {transform:translateY(-13px) rotate(-8deg)}
  65%    {transform:translateY(-4px) rotate(2deg)}
}
@keyframes seal-bob{
  0%,100%{transform:translateY(0) rotate(0)}
  30%    {transform:translateY(-4px) rotate(-3deg)}
  60%    {transform:translateY(-6px) rotate(3deg)}
}
@keyframes pom-bounce{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  14%    {transform:translateY(3px) scaleX(1.12) scaleY(.84)}
  30%    {transform:translateY(-17px) scaleX(.88) scaleY(1.14)}
  50%    {transform:translateY(2px) scaleX(1.10) scaleY(.86)}
  66%    {transform:translateY(-8px) scaleX(.95) scaleY(1.06)}
  82%    {transform:translateY(0) scaleX(1.02) scaleY(.98)}
}
@keyframes panda-munch{
  0%,100%{transform:rotate(0) scaleX(1)}
  16%    {transform:rotate(-4deg) scaleX(1.08)}
  33%    {transform:rotate(4deg) scaleX(.93)}
  52%    {transform:rotate(-2deg) scaleX(1.04)}
  70%    {transform:rotate(0) scaleX(1)}
}
@keyframes cockatiel-bob{
  0%,100%{transform:translateY(0) rotate(0)}
  22%    {transform:translateY(-7px) rotate(-7deg)}
  44%    {transform:translateY(-4px) rotate(0)}
  66%    {transform:translateY(-8px) rotate(7deg)}
}
@keyframes owl-sway{
  0%,100%{transform:rotate(0)}
  35%    {transform:rotate(-4deg)}
  65%    {transform:rotate(4deg)}
}
@keyframes jelly-pulse{
  0%,100%{transform:scaleX(1) scaleY(1) translateY(0)}
  32%    {transform:scaleX(1.12) scaleY(.86) translateY(3px)}
  62%    {transform:scaleX(.90) scaleY(1.12) translateY(-5px)}
}
@keyframes puff-inflate{
  0%,100%{transform:scale(1)}
  50%    {transform:scale(1.16,.90)}
}
@keyframes monkey-swing{
  0%,100%{transform:translateY(0) rotate(0)}
  25%    {transform:translateY(-10px) rotate(-12deg)}
  50%    {transform:translateY(-14px) rotate(0)}
  75%    {transform:translateY(-10px) rotate(12deg)}
}
@keyframes chick-peep{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  20%    {transform:translateY(-10px) scaleX(.90) scaleY(1.12)}
  40%    {transform:translateY(-14px) rotate(-3deg)}
  60%    {transform:translateY(-10px) rotate(3deg) scaleX(.92) scaleY(1.10)}
  80%    {transform:translateY(-2px) scaleX(1.05) scaleY(.95)}
}
@keyframes sloth-hang{
  0%,100%{transform:rotate(-7deg) translateY(0)}
  50%    {transform:rotate(7deg) translateY(-3px)}
}
@keyframes otter-roll{
  0%,100%{transform:translateY(0) rotate(0)}
  25%    {transform:translateY(-8px) rotate(-16deg)}
  50%    {transform:translateY(-10px) rotate(0)}
  75%    {transform:translateY(-8px) rotate(16deg)}
}

/* ── hover jelly ─────────────────────────────────────────────────── */
@keyframes jelly{
  0%  {transform:translateY(0) scaleX(1) scaleY(1)}
  10% {transform:translateY(4px) scaleX(1.15) scaleY(.80)}
  26% {transform:translateY(-24px) scaleX(.86) scaleY(1.16)}
  44% {transform:translateY(3px) scaleX(1.11) scaleY(.85)}
  58% {transform:translateY(-11px) scaleX(.95) scaleY(1.06)}
  70% {transform:translateY(1px) scaleX(1.04) scaleY(.96)}
  82% {transform:translateY(-5px) scaleX(.98) scaleY(1.02)}
  100%{transform:translateY(0) scaleX(1) scaleY(1)}
}

/* ── sub-element CSS animations ──────────────────────────────────── */
@keyframes tail-wag{
  0%,100%{transform:rotate(-30deg)}
  50%    {transform:rotate(30deg)}
}
.shibu-tail{transform-box:fill-box;transform-origin:15% 85%;
            animation:tail-wag .50s ease-in-out infinite;}

@keyframes gill-sway{
  0%,100%{transform:scaleY(1)}
  50%    {transform:scaleY(1.28)}
}
.axie-gill-L{transform-box:fill-box;transform-origin:50% 100%;
             animation:gill-sway 1.7s ease-in-out 0s infinite;}
.axie-gill-C{transform-box:fill-box;transform-origin:50% 100%;
             animation:gill-sway 1.7s ease-in-out .32s infinite;}
.axie-gill-R{transform-box:fill-box;transform-origin:50% 100%;
             animation:gill-sway 1.7s ease-in-out .64s infinite;}

@keyframes ear-L-twitch{
  0%,55%,100%{transform:rotate(-9deg)}
  28%        {transform:rotate(-26deg)}
}
@keyframes ear-R-twitch{
  0%,18%,100%{transform:rotate(9deg)}
  48%        {transform:rotate(26deg)}
}
.bun-ear-L{transform-box:fill-box;transform-origin:50% 88%;
           animation:ear-L-twitch 3.0s ease-in-out 0s infinite;}
.bun-ear-R{transform-box:fill-box;transform-origin:50% 88%;
           animation:ear-R-twitch 3.6s ease-in-out .8s infinite;}

@keyframes mochi-tail-flick{
  0%,60%,100%{transform:rotate(0)}
  72%        {transform:rotate(-42deg)}
  86%        {transform:rotate(16deg)}
}
.mochi-tail{transform-box:fill-box;transform-origin:95% 50%;
            animation:mochi-tail-flick 4.2s ease-in-out infinite;}

@keyframes roro-tail-sway{
  0%,100%{transform:rotate(-20deg)}
  50%    {transform:rotate(-4deg)}
}
.roro-tail{transform-box:fill-box;transform-origin:50% 90%;
           animation:roro-tail-sway 2.1s ease-in-out infinite;}

@keyframes kitsune-tail-sway{
  0%,100%{transform:rotate(0)}
  50%    {transform:rotate(14deg)}
}
.kt0{transform-box:fill-box;transform-origin:50% 90%;
     animation:kitsune-tail-sway 1.5s ease-in-out 0.0s infinite;}
.kt1{transform-box:fill-box;transform-origin:50% 90%;
     animation:kitsune-tail-sway 1.5s ease-in-out 0.22s infinite;}
.kt2{transform-box:fill-box;transform-origin:50% 90%;
     animation:kitsune-tail-sway 1.5s ease-in-out 0.44s infinite;}

.maru-cheek{transform-box:fill-box;transform-origin:center;transition:transform .28s ease;}

/* stages */
.stages{display:flex;gap:8px;align-items:flex-end;overflow-x:auto;padding-bottom:4px;}
.stg{flex:0 0 auto;text-align:center;}
.stg-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ddd;margin-bottom:6px;}
.stg-cst{font-size:.64rem;font-weight:700;color:#f0a020;margin-top:5px;}
</style>
</head>
<body>
<header>
  <h1>Terse Pals</h1>
  <p class="sub">养成系统 · grow your companion with every token you save</p>
</header>
<div class="wrap">
  <div class="sh">32 companions</div>
  <div class="grid" id="grid"></div>
  <div class="sh">growth stages</div>
  <div class="stages" id="stages"></div>
</div>
<script>
const dk=(h,f)=>'#'+[16,8,0].map(s=>Math.max(0,Math.round(((parseInt(h.slice(1),16)>>s)&255)*f)).toString(16).padStart(2,'0')).join('');
const lt=(h,f)=>'#'+[16,8,0].map(s=>Math.min(255,Math.round(((parseInt(h.slice(1),16)>>s)&255)*f)).toString(16).padStart(2,'0')).join('');

const PALS=[
  {id:'axie',   name:'Axie',   sub:'Axolotl',   body:'#F2A8C4',earIn:'#FCDAE8',acc:'#B890E0',anim:'axie-drift',   spd:3.6},
  {id:'capy',   name:'Capy',   sub:'Capybara',  body:'#D4A870',earIn:'#EAD0A8',acc:'#F0B020',anim:'capy-zen',     spd:6.2},
  {id:'shibu',  name:'Shibu',  sub:'Shiba Inu', body:'#F0A040',earIn:'#F8CC88',acc:'#E8C840',anim:'shibu-zoomies',spd:2.3},
  {id:'roro',   name:'Roro',   sub:'Red Panda', body:'#E07060',earIn:'#F0B0A0',acc:'#E8C030',anim:'roro-tumble',  spd:3.0},
  {id:'waddle', name:'Waddle', sub:'Penguin',   body:'#4870A0',earIn:'#8090A8',acc:'#E03030',anim:'waddle-toe',   spd:1.6},
  {id:'quack',  name:'Quack',  sub:'Duck',      body:'#F4CC40',earIn:'#F8E898',acc:'#F09030',anim:'quack-bob',    spd:2.2},
  {id:'mochi',  name:'Mochi',  sub:'Fold Cat',  body:'#A8A4C4',earIn:'#CCCCE0',acc:'#C0B8D8',anim:'mochi-loaf',  spd:4.2},
  {id:'rivet',  name:'Rivet',  sub:'Tree Frog', body:'#50B870',earIn:'#88D0A0',acc:'#D8D040',anim:'frog-hop',     spd:1.9},
  {id:'bun',    name:'Bun',    sub:'Bunny',     body:'#ECD8D4',earIn:'#F8ECEC',acc:'#EFAAB8',anim:'bun-hop',      spd:3.1},
  {id:'kuma',   name:'Kuma',   sub:'Brown Bear',body:'#C09060',earIn:'#D8B888',acc:'#F0C040',anim:'kuma-nap',     spd:4.8},
  {id:'kitsune',name:'Kitsune',sub:'Fox',       body:'#E888B0',earIn:'#F4BAD0',acc:'#5C9C50',anim:'kitsune-play', spd:4.0},
  {id:'maru',   name:'Maru',   sub:'Hamster',   body:'#E8A870',earIn:'#F4C8A8',acc:'#8B6234',anim:'maru-munch',   spd:1.2},
  {id:'panda',  name:'Panda',  sub:'Giant Panda',body:'#F0EEE8',earIn:'#E8E4DC',acc:'#1A1020',anim:'panda-munch',  spd:5.0},
  {id:'otter',  name:'Otter',  sub:'Sea Otter',  body:'#A87850',earIn:'#C8A878',acc:'#E8D0A0',anim:'otter-roll',   spd:4.4},
  {id:'sloth',  name:'Sloth',  sub:'Three-Toed', body:'#B0A090',earIn:'#C8BAA8',acc:'#6A9050',anim:'sloth-hang',   spd:7.0},
  {id:'corgi',  name:'Corgi',  sub:'Pembroke',   body:'#E8A850',earIn:'#F4C888',acc:'#F8E8D0',anim:'corgi-trot',   spd:1.8},
  {id:'seal',   name:'Seal',   sub:'Harp Seal',  body:'#F0EEE8',earIn:'#FAFAF8',acc:'#90B8D0',anim:'seal-bob',     spd:2.6},
  {id:'tanuki', name:'Tanuki', sub:'Raccoon Dog', body:'#C0987A',earIn:'#D8C0A0',acc:'#6A4A28',anim:'tanuki-waddle',spd:3.8},
  {id:'sheep',  name:'Sheep',  sub:'Baby Sheep',  body:'#F4F0E8',earIn:'#FFFCF8',acc:'#C8B8A0',anim:'sheep-graze', spd:5.5},
  {id:'persian',name:'Persian',sub:'Persian Cat', body:'#B8B4C0',earIn:'#D0CCE0',acc:'#F0C8D0',anim:'persian-purr',spd:4.8},
  {id:'deer',   name:'Deer',   sub:'Baby Fawn',   body:'#D4A870',earIn:'#E8C898',acc:'#FFFFFF', anim:'deer-prance', spd:3.0},
  {id:'nemu',   name:'Nemu',   sub:'Sleepy Cat',  body:'#6A6878',earIn:'#8888A0',acc:'#F0C8C8',anim:'nemu-nap',    spd:6.0},
  {id:'koi',    name:'Koi',    sub:'Koi Fish',    body:'#E04030',earIn:'#F08070',acc:'#F8F8F0',anim:'koi-swim',    spd:3.4},
  {id:'arctic', name:'Arctic', sub:'Arctic Fox',  body:'#F0F0F0',earIn:'#FAFAFA',acc:'#A8C0D8',anim:'arctic-play', spd:2.8},
  {id:'pom',    name:'Pom',    sub:'Pomeranian',  body:'#F0A848',earIn:'#F8CC80',acc:'#E89040',anim:'pom-bounce',  spd:1.6},
  {id:'tiel',   name:'Tiel',   sub:'Cockatiel',   body:'#F4D060',earIn:'#F8E898',acc:'#E87040',anim:'cockatiel-bob',spd:2.2},
  {id:'owl',    name:'Owl',    sub:'Little Owl',  body:'#B09060',earIn:'#C8B080',acc:'#F0C840',anim:'owl-sway',    spd:4.0},
  {id:'jelly',  name:'Jelly',  sub:'Moon Jelly',  body:'#E8A8D0',earIn:'#F0C8E0',acc:'#C888C0',anim:'jelly-pulse', spd:3.6},
  {id:'puff',   name:'Puff',   sub:'Pufferfish',  body:'#70B8A8',earIn:'#98D0C0',acc:'#F0D850',anim:'puff-inflate',spd:4.0},
  {id:'monkey', name:'Monkey', sub:'Baby Monkey', body:'#C09068',earIn:'#D8B890',acc:'#E8C8A0',anim:'monkey-swing',spd:2.4},
  {id:'chick',  name:'Chick',  sub:'Baby Chick',  body:'#F8D850',earIn:'#FCE898',acc:'#F09040',anim:'chick-peep',  spd:2.0},
  {id:'narwhal',name:'Narwhal',sub:'Narwhal',     body:'#A8C8E0',earIn:'#C8E0F0',acc:'#E0F0F8',anim:'narwhal-drift',spd:4.8},
];

const EYE='#1A1020';

function palSVG(p,s,stg){
  const SCALES=[.42,.56,.69,.82,.94,1.05];
  const sc=SCALES[Math.min(stg,5)];
  const cx=s*.50, cy=s*.57, r=s*.358;
  const bDk=dk(p.body,.66);
  let g='';

  /* ── body shape params ── */
  let bRx=r, bRy=r, bodyEl=null, topY, botY;
  if(p.id==='capy'){
    bRx=r*1.30; bRy=r*0.75;
    bodyEl=`<ellipse cx="${cx}" cy="${cy}" rx="${bRx}" ry="${bRy}" fill="${p.body}"/>`;
  } else if(p.id==='rivet'){
    bRx=r*1.14; bRy=r*0.88;
    bodyEl=`<ellipse cx="${cx}" cy="${cy}" rx="${bRx}" ry="${bRy}" fill="${p.body}"/>`;
  } else if(p.id==='bun'){
    bRx=r*0.91; bRy=r*1.08;
    bodyEl=`<ellipse cx="${cx}" cy="${cy}" rx="${bRx}" ry="${bRy}" fill="${p.body}"/>`;
  } else if(p.id==='waddle'){
    // egg: narrow top, wide bottom
    const w=r*0.87, ht=r;
    bodyEl=`<path d="M${cx},${cy-ht} C${cx+w*.54},${cy-ht} ${cx+w},${cy-ht*.12} ${cx+w},${cy+ht*.32} C${cx+w},${cy+ht*1.05} ${cx+w*.60},${cy+ht} ${cx},${cy+ht} C${cx-w*.60},${cy+ht} ${cx-w},${cy+ht*1.05} ${cx-w},${cy+ht*.32} C${cx-w},${cy-ht*.12} ${cx-w*.54},${cy-ht} ${cx},${cy-ht} Z" fill="${p.body}"/>`;
    bRx=w; bRy=ht;
  } else if(p.id==='mochi'){
    // cat loaf: rounded rectangle
    const ww=r*1.10, hh=r*0.84, rr=r*0.46;
    bodyEl=`<rect x="${cx-ww}" y="${cy-hh}" width="${ww*2}" height="${hh*2}" rx="${rr}" ry="${rr}" fill="${p.body}"/>`;
    bRx=ww; bRy=hh;
  } else if(p.id==='roro'){
    // pear: slightly bottom-heavy
    const w=r*0.96, ht=r, hb=r*1.05;

    g+=`<ellipse cx="${cx}" cy="${hY+r*.08}" rx="${r*.46}" ry="${r*.11}" fill="white"/>`;
    g+=`<rect x="${cx-r*.26}" y="${hY-r*.28}" width="${r*.52}" height="${r*.34}" rx="${r*.05}" fill="white"/>`;
    g+=`<rect x="${cx-r*.26}" y="${hY-r*.04}" width="${r*.52}" height="${r*.10}" fill="#2060C0"/>`;
    g+=`<circle cx="${cx}" cy="${hY-r*.28}" r="${r*.06}" fill="#2060C0"/>`;
  }
  // Kitsune leaf on head
  if(p.id==='kitsune'){
    const lY=topY-r*.08;
    g+=`<ellipse cx="${cx}" cy="${lY}" rx="${r*.26}" ry="${r*.155}" fill="${p.acc}" transform="rotate(-18,${cx},${lY})"/>`;
    g+=`<path d="M${cx-r*.22},${lY+r*.08} Q${cx},${lY-r*.05} ${cx+r*.22},${lY-r*.05}" stroke="${lt(p.acc,1.5)}" stroke-width="${(r*.028).toFixed(1)}" fill="none" opacity=".60" transform="rotate(-18,${cx},${lY})"/>`;
  }
  // Kuma honey pot
  if(p.id==='kuma'){
    const pX=cx+r*.62, pY=cy+r*.40;
    g+=`<ellipse cx="${pX}" cy="${pY+r*.04}" rx="${r*.18}" ry="${r*.22}" fill="#E8A820"/>`;
    g+=`<rect x="${pX-r*.20}" y="${pY-r*.22}" width="${r*.40}" height="${r*.08}" rx="${r*.04}" fill="${dk('#E8A820',.82)}"/>`;
    g+=`<circle cx="${pX}" cy="${pY+r*.26}" r="${r*.06}" fill="#E8C040"/>`;
  }
  // Maru sunflower seed
  if(p.id==='maru'){
    g+=`<ellipse cx="${cx}" cy="${cy+r*.54}" rx="${r*.064}" ry="${r*.130}" fill="${p.acc}"/>`;
    g+=`<ellipse cx="${cx}" cy="${cy+r*.54}" rx="${r*.028}" ry="${r*.082}" fill="${lt(p.acc,1.3)}" opacity=".70"/>`;
  }
  // Rivet leaf umbrella
  if(p.id==='rivet'){
    const lX=cx+r*.14, lY=topY-r*.20;
    g+=`<ellipse cx="${lX}" cy="${lY}" rx="${r*.36}" ry="${r*.20}" fill="#58C068" transform="rotate(-10,${lX},${lY})"/>`;
    g+=`<path d="M${lX-r*.30},${lY+r*.14} Q${lX},${lY-r*.06} ${lX+r*.30},${lY+r*.06}" stroke="${lt('#58C068',1.4)}" stroke-width="${(r*.030).toFixed(1)}" fill="none" opacity=".60" transform="rotate(-10,${lX},${lY})"/>`;
    g+=`<line x1="${lX+r*.04}" y1="${lY+r*.18}" x2="${lX+r*.04}" y2="${lY+r*.46}" stroke="#6B4B2A" stroke-width="${(r*.044).toFixed(1)}" stroke-linecap="round"/>`;
  }
  // Panda bamboo
  if(p.id==='panda'){
    const bX=cx+r*.72, bY=cy+r*.52;
    g+=`<rect x="${bX-r*.06}" y="${bY-r*.50}" width="${r*.12}" height="${r*.54}" rx="${r*.06}" fill="#7CB87C"/>`;
    g+=`<ellipse cx="${bX}" cy="${bY-r*.28}" rx="${r*.14}" ry="${r*.06}" fill="#64A064" opacity=".80"/>`;
    g+=`<ellipse cx="${bX}" cy="${bY}" rx="${r*.14}" ry="${r*.06}" fill="#64A064" opacity=".80"/>`;
  }
  // Tanuki magic leaf (tanuki kasa)
  if(p.id==='tanuki'){
    const lY=topY-r*.08;
    g+=`<path d="M${cx-r*.38},${lY} Q${cx},${lY-r*.46} ${cx+r*.38},${lY}" fill="#68B460" opacity=".92"/>`;
    g+=`<path d="M${cx-r*.32},${lY} Q${cx},${lY-r*.22} ${cx+r*.32},${lY}" stroke="${lt('#68B460',1.40)}" stroke-width="${(r*.024).toFixed(1)}" fill="none" opacity=".55"/>`;
  }
  // Deer star sparkle
  if(p.id==='deer'){
    const sX=cx+r*.76, sY=topY+r*.06, sR=r*.10;
    for(let i=0;i<5;i++){const a=i*Math.PI*.4-Math.PI*.5;g+=`<line x1="${sX}" y1="${sY}" x2="${(sX+Math.cos(a)*sR).toFixed(1)}" y2="${(sY+Math.sin(a)*sR).toFixed(1)}" stroke="${p.acc}" stroke-width="${(r*.04).toFixed(1)}" stroke-linecap="round"/>`;}
    g+=`<circle cx="${sX}" cy="${sY}" r="${sR*.35}" fill="${p.acc}" opacity=".90"/>`;
  }
  // Otter shell on belly
  if(p.id==='otter'){
    const sX=cx, sY=cy+r*.28;
    g+=`<ellipse cx="${sX}" cy="${sY}" rx="${r*.18}" ry="${r*.12}" fill="${lt(p.acc,1.08)}" opacity=".85"/>`;
    g+=`<path d="M${sX-r*.16},${sY} Q${sX},${sY-r*.14} ${sX+r*.16},${sY}" stroke="${dk(p.acc,.82)}" stroke-width="${(r*.028).toFixed(1)}" fill="none" opacity=".60"/>`;
  }
  // Seal balancing ball
  if(p.id==='seal'){
    g+=`<circle cx="${cx}" cy="${topY-r*.22}" r="${r*.20}" fill="${p.acc}" opacity=".85"/>`;
    g+=`<circle cx="${cx-r*.06}" cy="${topY-r*.28}" r="${r*.06}" fill="white" opacity=".55"/>`;
  }
  // Arctic snowflake
  if(p.id==='arctic'){
    const sfX=cx+r*.72, sfY=topY+r*.04;
    for(let i=0;i<6;i++){const a=i*Math.PI/3;g+=`<line x1="${sfX}" y1="${sfY}" x2="${(sfX+Math.cos(a)*r*.14).toFixed(1)}" y2="${(sfY+Math.sin(a)*r*.14).toFixed(1)}" stroke="${p.acc}" stroke-width="${(r*.046).toFixed(1)}" stroke-linecap="round"/>`;}
    g+=`<circle cx="${sfX}" cy="${sfY}" r="${r*.036}" fill="${p.acc}"/>`;
  }
  // Monkey banana
  if(p.id==='monkey'){
    const bX=cx-r*.70, bY=cy+r*.36;
    g+=`<path d="M${bX-r*.14},${bY-r*.28} Q${bX+r*.22},${bY-r*.38} ${bX+r*.30},${bY+r*.16}" fill="none" stroke="#F0D030" stroke-width="${r*.18}" stroke-linecap="round"/>`;
    g+=`<circle cx="${bX-r*.14}" cy="${bY-r*.28}" r="${r*.06}" fill="#C8A030"/>`;
  }
  // Chick egg shell piece
  if(p.id==='chick'){
    const eY=botY-r*.06;
    g+=`<path d="M${cx-r*.34},${eY} Q${cx-r*.40},${eY-r*.30} ${cx-r*.10},${eY-r*.40} Q${cx+r*.10},${eY-r*.40} ${cx+r*.34},${eY}" fill="${lt(p.body,1.12)}" opacity=".70"/>`;
    g+=`<path d="M${cx-r*.34},${eY} Q${cx-r*.40},${eY-r*.30} ${cx-r*.10},${eY-r*.40} Q${cx+r*.10},${eY-r*.40} ${cx+r*.34},${eY}" fill="none" stroke="${dk(p.body,.72)}" stroke-width="${(r*.050).toFixed(1)}" stroke-linecap="round"/>`;
  }
  // Sloth branch above
  if(p.id==='sloth'){
    const brY=topY-r*.10;
    g+=`<path d="M${cx-r*1.10},${brY} Q${cx},${brY+r*.08} ${cx+r*1.10},${brY}" fill="none" stroke="#8B6234" stroke-width="${r*.16}" stroke-linecap="round"/>`;
    g+=`<ellipse cx="${cx-r*.60}" cy="${brY}" rx="${r*.08}" ry="${r*.04}" fill="#5C9050" opacity=".70"/>`;
    g+=`<ellipse cx="${cx+r*.44}" cy="${brY-r*.02}" rx="${r*.08}" ry="${r*.04}" fill="#5C9050" opacity=".70"/>`;
  }
  // Pom little bow
  if(p.id==='pom'){
    const bX=cx+r*.62, bY=topY+r*.12;
    g+=`<path d="M${bX},${bY} L${bX+r*.16},${bY-r*.12} L${bX+r*.20},${bY+r*.02} Z" fill="${p.acc}" opacity=".85"/>`;
    g+=`<path d="M${bX},${bY} L${bX+r*.16},${bY+r*.14} L${bX+r*.20},${bY+r*.02} Z" fill="${dk(p.acc,.84)}" opacity=".85"/>`;
    g+=`<circle cx="${bX+r*.04}" cy="${bY+r*.02}" r="${r*.048}" fill="${lt(p.acc,1.30)}" opacity=".90"/>`;
  }
  // Owl star badge
  if(p.id==='owl'){
    const sX=cx+r*.62, sY=cy+r*.44;
    g+=`<circle cx="${sX}" cy="${sY}" r="${r*.15}" fill="${p.acc}" opacity=".90"/>`;
    g+=`<circle cx="${sX}" cy="${sY}" r="${r*.08}" fill="${lt(p.acc,1.40)}" opacity=".80"/>`;
  }
  // Persian bow ribbon
  if(p.id==='persian'){
    const bX=cx, bY=topY-r*.02;
    g+=`<path d="M${bX},${bY} L${bX-r*.18},${bY-r*.12} L${bX-r*.22},${bY+r*.02} Z" fill="${p.acc}" opacity=".85"/>`;
    g+=`<path d="M${bX},${bY} L${bX+r*.18},${bY-r*.12} L${bX+r*.22},${bY+r*.02} Z" fill="${p.acc}" opacity=".85"/>`;
    g+=`<path d="M${bX},${bY} L${bX-r*.18},${bY+r*.14} L${bX-r*.22},${bY+r*.02} Z" fill="${dk(p.acc,.84)}" opacity=".85"/>`;
    g+=`<path d="M${bX},${bY} L${bX+r*.18},${bY+r*.14} L${bX+r*.22},${bY+r*.02} Z" fill="${dk(p.acc,.84)}" opacity=".85"/>`;
    g+=`<circle cx="${bX}" cy="${bY}" r="${r*.056}" fill="${lt(p.acc,1.30)}" opacity=".90"/>`;
  }
  // Tiel seed stick (millet)
  if(p.id==='tiel'){
    const sX=cx+r*.66, sY=cy+r*.30;
    g+=`<line x1="${sX}" y1="${sY-r*.30}" x2="${sX}" y2="${sY+r*.28}" stroke="#B8A050" stroke-width="${(r*.06).toFixed(1)}" stroke-linecap="round"/>`;
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2, rx=sX+Math.cos(a)*r*.10, ry=(sY-r*.12)+Math.sin(a)*r*.12;g+=`<circle cx="${rx.toFixed(1)}" cy="${ry.toFixed(1)}" r="${(r*.044).toFixed(1)}" fill="#E0C840" opacity=".88"/>`;}
  }

  const ancY=botY;
  return `<g transform="translate(${(cx*(1-sc)).toFixed(2)},${(ancY*(1-sc)).toFixed(2)}) scale(${sc})">${g}</g>`;
}

/* ── render grid ── */
const S=108;
const grid=document.getElementById('grid');
PALS.forEach((p,i)=>{
  const div=document.createElement('div');
  div.className='card';
  const n=parseInt(p.body.slice(1),16);
  div.style.background=`rgb(${[16,8,0].map(s=>Math.round(((n>>s)&255)*.14+255*.86)).join(',')})`;
  div.innerHTML=`
    <div class="pal" style="animation:${p.anim} ${p.spd}s ease-in-out ${(i*.17).toFixed(2)}s infinite;">
      <svg width="${S}" height="${S+8}" viewBox="-22 -24 ${S+44} ${S+32}"
           style="display:block;margin:0 auto;overflow:visible;">
        ${palSVG(p,S,5)}
      </svg>
    </div>
    <div class="cname">${p.name}</div>
    <div class="csub">${p.sub}</div>`;
  grid.appendChild(div);
});

/* ── hover jelly ── */
document.querySelectorAll('.card').forEach((card,i)=>{
  const pal=card.querySelector('.pal');
  const p=PALS[i];
  const idle=`${p.anim} ${p.spd}s ease-in-out ${(i*.17).toFixed(2)}s infinite`;
  card.addEventListener('mouseenter',()=>{
    pal.style.animation='jelly .82s cubic-bezier(.34,1.56,.64,1)';
    pal.addEventListener('animationend',()=>{pal.style.animation=idle;},{once:true});
  });
});

/* ── blink ── */
function scheduleBlink(el,origRy){
  setTimeout(()=>{
    let f=0;const N=14;
    const go=()=>{
      f++;const t=f/N;
      const ry=t<.35?origRy*(1-t/.35):t<.55?origRy*.04:origRy*((t-.55)/.45);
      el.setAttribute('ry',ry.toFixed(2));
      if(f<N) requestAnimationFrame(go);
      else{el.setAttribute('ry',origRy);scheduleBlink(el,origRy);}
    };
    requestAnimationFrame(go);
  },2400+Math.random()*3600);
}
document.querySelectorAll('.eye').forEach(el=>{
  if(el.tagName!=='ellipse') return;
  const ry=parseFloat(el.getAttribute('ry')||el.getAttribute('rx')||0);
  if(ry<1) return;
  setTimeout(()=>scheduleBlink(el,ry),Math.random()*5000);
});

/* ── look-around ── */
document.querySelectorAll('.card').forEach(card=>{
  const eyes=[...card.querySelectorAll('.eye[data-ox]')];
  if(!eyes.length) return;
  function glance(){
    const dx=(Math.random()-.5)*5.5, dy=(Math.random()-.5)*2.5;
    eyes.forEach(e=>{
      e.setAttribute('cx',(+e.getAttribute('data-ox')+dx).toFixed(2));
      e.setAttribute('cy',(+e.getAttribute('data-oy')+dy).toFixed(2));
    });
    setTimeout(()=>{
      eyes.forEach(e=>{
        e.setAttribute('cx',e.getAttribute('data-ox'));
        e.setAttribute('cy',e.getAttribute('data-oy'));
      });
      setTimeout(glance,3200+Math.random()*4000);
    },520+Math.random()*580);
  }
  setTimeout(glance,1200+Math.random()*5000);
});

/* ── Maru cheek puff ── */
const maruCheeks=document.querySelectorAll('.maru-cheek');
if(maruCheeks.length){
  function puff(){
    const sc=1+Math.random()*.24;
    maruCheeks.forEach(c=>c.style.transform=`scale(${sc.toFixed(2)})`);
    setTimeout(()=>{
      maruCheeks.forEach(c=>c.style.transform='scale(1)');
      setTimeout(puff,1100+Math.random()*2000);
    },550+Math.random()*380);
  }
  setTimeout(puff,500);
}

/* ── Rivet tongue flick ── */
const rivetTongue=document.querySelector('.rivet-tongue');
if(rivetTongue){
  const origRy=parseFloat(rivetTongue.getAttribute('ry'));
  function flickTongue(){
    let f=0;const N=12;
    const go=()=>{
      f++;const t=f/N;
      const ry=t<.4?origRy*(t/.4)*2.4:t<.62?origRy*2.4:origRy*2.4*((1-t)/.38);
      rivetTongue.setAttribute('ry',Math.max(0,ry).toFixed(2));
      if(f<N) requestAnimationFrame(go);
      else{rivetTongue.setAttribute('ry',origRy);setTimeout(flickTongue,2800+Math.random()*4500);}
    };
    requestAnimationFrame(go);
  }
  setTimeout(flickTongue,1800+Math.random()*3000);
}

/* ── Capy random sneeze ── */
document.querySelectorAll('.card').forEach((card,i)=>{
  if(PALS[i].id!=='capy') return;
  const pal=card.querySelector('.pal');
  const idle=`capy-zen ${PALS[i].spd}s ease-in-out ${(i*.17).toFixed(2)}s infinite`;
  function sneeze(){
    pal.style.animation='none';
    const kfs=[
      [.10, 0,  1, -1],
      [.20, 1, -3,  0],
      [.38,-1,  9,  3],
      [.56, 0, -2, -1],
      [.74, 0,  0,  0],
    ];
    let f=0;const N=20;
    const go=()=>{
      f++;const t=f/N;
      let best=kfs[0];
      for(const k of kfs) if(k[0]<=t) best=k;
      pal.style.transform=`translateX(${best[1]}px) translateY(${best[2]}px) rotate(${best[3]}deg)`;
      if(f<N) requestAnimationFrame(go);
      else{pal.style.transform='';pal.style.animation=idle;setTimeout(sneeze,11000+Math.random()*18000);}
    };
    requestAnimationFrame(go);
  }
  setTimeout(sneeze,5000+Math.random()*8000);
});
