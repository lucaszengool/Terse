<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="bar">
    <div class="bar-header">
      <div class="bar-left">
        <div class="dot"></div>
        <span id="appLabel">Terse</span>
      </div>
      <div class="bar-right">
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="light" title="Typos + whitespace only">Soft</button>
          <button class="mode-btn" data-mode="balanced" title="Balanced optimization">Normal</button>
          <button class="mode-btn" data-mode="aggressive" title="Maximum compression">Aggr</button>
        </div>
        <div class="auto-toggle">
          <button class="auto-btn" data-auto="off" title="Manual only">Off</button>
          <button class="auto-btn active" data-auto="send" title="Optimize when you press Enter">Send</button>
          <button class="auto-btn" data-auto="auto" title="Live replace as you type">Auto</button>
        </div>
      </div>
    </div>

    <!-- Auth gate — shown when not signed in or no active subscription -->
    <div id="authGate" class="auth-gate hidden">
      <p id="gateTitle" class="gate-title">Sign in to use Terse</p>
      <p id="gateDesc" class="gate-desc">Create an account and start your 30-day free trial.</p>
      <button id="gateBtn" class="gate-btn">Sign In / Sign Up</button>
      <p class="gate-mac-note">Want agent token optimization?<br><a id="macAppLink" href="https://www.terseai.org" target="_blank">Download the Mac app</a> — use the same account.</p>
    </div>

    <div class="bar-stats-row">
      <div id="techniques" class="techniques"></div>
      <span id="popupQuota" class="popup-quota"></span>
      <div class="bar-stats">
        <span id="tokBefore">0</span>
        <span class="arrow">→</span>
        <span id="tokAfter" class="accent">0</span>
        <span id="tokPct" class="pct"></span>
      </div>
    </div>

    <div id="hintState" class="hint-state">
      <span>Select text on page, then click <b>Capture</b></span>
    </div>

    <textarea id="optimized" class="opt-text hidden" spellcheck="false" readonly placeholder="Optimized text appears here..."></textarea>

    <!-- Manual input area -->
    <div id="manualWrap" class="manual-wrap">
      <div class="manual-divider"><span>or paste here</span></div>
      <textarea id="manualInput" class="manual-area" placeholder="Paste a prompt to optimize..." spellcheck="false"></textarea>
    </div>

    <div class="actions">
      <button id="btnCapture" class="capture-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Capture
      </button>
      <button id="btnReplace" class="replace-btn" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Replace
      </button>
      <button id="btnCopy" class="copy-btn" title="Copy optimized text">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
      <button id="btnUndo" class="undo-btn hidden" title="Undo Replace">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-8.36L1 10"/></svg>
        Undo
      </button>
    </div>

    <!-- Stats summary -->
    <div id="statsBar" class="stats-bar hidden">
      <span class="stats-label">Total saved:</span>
      <span id="totalSaved" class="stats-value">0</span>
      <span class="stats-label">tokens across</span>
      <span id="totalOpts" class="stats-value">0</span>
      <span class="stats-label">optimizations</span>
    </div>

    <!-- Footer: settings + auth -->
    <div class="footer">
      <button id="btnSettings" class="footer-btn" title="Settings">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <div class="theme-picker-mini">
        <div class="theme-dot" data-t="lime" style="background:#d1e847" title="Lime"></div>
        <div class="theme-dot" data-t="lavender" style="background:#c4b5fd" title="Lavender"></div>
        <div class="theme-dot" data-t="coral" style="background:#ff8a80" title="Coral"></div>
        <div class="theme-dot" data-t="teal" style="background:#5eead4" title="Teal"></div>
        <div class="theme-dot" data-t="midnight" style="background:#1e293b" title="Midnight"></div>
        <div class="theme-dot" data-t="rose" style="background:#fda4af" title="Rose"></div>
        <div class="theme-dot" data-t="sage" style="background:#86efac" title="Sage"></div>
        <div class="theme-dot" data-t="sand" style="background:#fde68a" title="Sand"></div>
      </div>
      <span id="authStatus" class="auth-status"></span>
    </div>
  </div>

  <script src="../lib/optimizer-bundle.js"></script>
  <script src="popup.js"></script>
</body>
</html>
