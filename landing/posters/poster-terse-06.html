<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse Poster 6 — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#FFED29;font-family:'Noto Sans SC','Inter',-apple-system,sans-serif;overflow:hidden}
.page{width:100%;height:100%;position:relative;display:flex;flex-direction:column;padding:4vh 5vw}
.counter{position:absolute;top:3vh;right:4vw;width:44px;height:44px;border-radius:50%;background:rgba(26,24,0,.1);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:rgba(26,24,0,.45)}
.title{font-size:clamp(32px,5vw,64px);font-weight:900;color:#1a1800;letter-spacing:-2px;line-height:1.1;margin-bottom:4px}
.subtitle{font-size:clamp(14px,1.8vw,22px);color:rgba(26,24,0,.3);font-weight:500}
.mac-area{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-top:1vh}
.mac-wrap{width:min(88%,820px);transform:perspective(1200px) rotateX(3deg);transform-origin:50% 100%}
.mac{background:#2d2d2d;border-radius:14px;padding:8px 8px 14px;box-shadow:0 30px 80px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.04)}
.mac-screen{background:#FFED29;border-radius:4px;overflow:hidden;padding:22px}
.lbl{font-size:9px;font-weight:700;color:rgba(26,24,0,.18);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.modes{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(26,24,0,.05);margin-bottom:16px}
.mode{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;background:rgba(255,255,255,.3);color:rgba(26,24,0,.25)}
.mode.a{background:#fff;color:#1a1800;font-weight:700}
.tr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13px;color:rgba(26,24,0,.55);border-bottom:1px solid rgba(26,24,0,.025)}
.tg{width:36px;height:20px;border-radius:10px;position:relative;flex-shrink:0}
.tg.on{background:#1a1800}.tg.off{background:rgba(26,24,0,.1)}
.tg::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.tg.on::after{right:2px}.tg.off::after{left:2px}
.badge{display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:8px 16px;background:rgba(26,24,0,.04);border-radius:8px;font-size:12px;color:rgba(26,24,0,.35)}
</style>
</head>
<body>
<div class="page">
  <div class="counter">6/6</div>
  <div class="title">完全掌控。<br>100% 本地。</div>
  <div class="subtitle">9 个开关，3 种模式，代码绝不离开你的 Mac</div>
  <div class="mac-area">
    <div class="mac-wrap"><div class="mac"><div class="mac-screen">
      <div style="font-size:18px;font-weight:700;margin-bottom:12px">Settings</div>
      <div class="lbl">AGGRESSIVENESS</div>
      <div class="modes"><div class="mode">Light</div><div class="mode a">Balanced</div><div class="mode">Aggressive</div></div>
      <div class="tr">Remove filler words<div class="tg on"></div></div>
      <div class="tr">Remove politeness<div class="tg on"></div></div>
      <div class="tr">Remove hedging<div class="tg on"></div></div>
      <div class="tr">Remove meta-language<div class="tg on"></div></div>
      <div class="tr">Shorten phrases<div class="tg on"></div></div>
      <div class="tr">Simplify vocabulary<div class="tg on"></div></div>
      <div class="tr">Remove redundancy<div class="tg off"></div></div>
      <div class="tr">Compress whitespace<div class="tg on"></div></div>
      <div class="tr">Compress code<div class="tg off"></div></div>
      <div class="badge">🔒 100% on-device · Zero cloud · No tracking</div>
    </div></div></div>
  </div>
</div>
</body>
</html>
