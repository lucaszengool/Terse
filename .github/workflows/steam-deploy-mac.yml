name: Steam Deploy (macOS)

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'Build description (shown in Steamworks)'
        required: false
        default: 'Automated build'
      branch:
        description: 'Steam branch to push to'
        required: false
        default: 'prerelease'

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (macOS)
        run: npm run tauri build
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Prepare Steam content folder
        run: |
          mkdir -p steam/content/mac
          cp -R "src-tauri/target/release/bundle/macos/Terse.app" steam/content/mac/Terse.app

      - name: Deploy to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          depotId1: ${{ secrets.STEAM_DEPOT_ID }}
          buildDescription: ${{ github.event.inputs.description || github.sha }}
          rootPath: steam/content
          depot1Path: mac
          releaseBranch: ${{ github.event.inputs.branch }}
