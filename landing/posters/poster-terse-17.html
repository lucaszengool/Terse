<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse — Welcome Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;background:#FFED29}

.stripe{position:absolute;background:rgba(255,255,255,.55);border-radius:0}
.s1{width:120px;height:100%;top:0;right:160px}
.s2{width:120px;height:100%;top:0;right:320px}
.s3{width:100%;height:120px;bottom:160px;left:0}

.logo{position:absolute;top:50px;right:60px;z-index:20}
.logo .name{font-size:64px;font-weight:900;color:#1a1800;letter-spacing:-2px;line-height:1}

.card{
  position:absolute;top:130px;left:50%;transform:translateX(-50%);
  width:800px;background:#FFED29;border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.18),0 10px 30px rgba(0,0,0,.08);
  z-index:10;overflow:hidden;
}

/* App icon */
.app-icon{
  width:120px;height:120px;border-radius:28px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
}
.app-icon .t{font-size:64px;font-weight:900;color:#1a1800}

.welcome-title{font-size:32px;font-weight:800;color:#1a1800;margin-bottom:8px}
.welcome-sub{font-size:16px;color:rgba(26,24,0,.45);font-weight:500;margin-bottom:36px}

/* Color circles */
.color-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:40px;
}
.color-circle{
  width:56px;height:56px;border-radius:50%;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  border:3px solid transparent;
}
.color-circle.selected{border-color:#1a1800}
.cc-white{background:#fff}
.cc-lavender{background:#d4cf70}
.cc-pink{background:#f9a8d4}
.cc-cyan{background:#67e8f9}
.cc-black{background:#1a1800}
.cc-rose{background:#fda4af}
.cc-mint{background:#86efac}
.cc-peach{background:#fed7aa}

/* Buttons */
.signin-btn{
  padding:14px 48px;background:#fff;border:none;border-radius:50px;
  font-size:17px;font-weight:700;color:#1a1800;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 16px rgba(0,0,0,.06);margin-bottom:16px;
}
.create-link{
  font-size:14px;color:rgba(26,24,0,.45);font-weight:600;
  text-decoration:none;cursor:pointer;
}
.create-link:hover{color:#1a1800}

/* Balls */
.balls{position:absolute;bottom:0;left:0;right:0;height:180px;z-index:5;overflow:hidden}
.ball{position:absolute;bottom:-20px;border-radius:50%;background:linear-gradient(145deg,#FFED29,#e8d620);display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a1800;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ball .face{position:absolute;display:flex;flex-direction:column;align-items:center}
.ball .eyes{display:flex;gap:6px}
.ball .eye{width:5px;height:5px;border-radius:50%;background:#1a1800}
.ball .eye.wink{width:7px;height:2px;border-radius:1px;background:#1a1800;margin-top:2px}
.ball .mouth{margin-top:3px}
.ball .mouth.smile{width:10px;height:5px;border-radius:0 0 6px 6px;border:2px solid #1a1800;border-top:0}
.ball .mouth.open{width:8px;height:8px;border-radius:50%;background:#1a1800}
.ball .mouth.flat{width:8px;height:2px;background:#1a1800;border-radius:1px}
.ball .mouth.grin{width:12px;height:6px;border-radius:0 0 8px 8px;background:#1a1800}
.ball .blush{position:absolute;width:6px;height:4px;border-radius:50%;background:#f9a8d4}
</style>
</head>
<body>

<div class="stripe s1"></div>
<div class="stripe s2"></div>
<div class="stripe s3"></div>

<div class="logo">
  <div class="name">Terse</div>
</div>

<div class="card">
  <div style="display:flex;flex-direction:column;align-items:center;padding:60px 40px 50px">
    <div class="app-icon"><div class="t">T</div></div>
    <div class="welcome-title">Welcome to Terse</div>
    <div class="welcome-sub">Choose your style</div>

    <div class="color-grid">
      <div class="color-circle cc-white selected"></div>
      <div class="color-circle cc-lavender"></div>
      <div class="color-circle cc-pink"></div>
      <div class="color-circle cc-cyan"></div>
      <div class="color-circle cc-black"></div>
      <div class="color-circle cc-rose"></div>
      <div class="color-circle cc-mint"></div>
      <div class="color-circle cc-peach"></div>
    </div>

    <button class="signin-btn">Sign In</button>
    <a class="create-link">Create Account</a>
  </div>
</div>

<div class="balls">
  <div class="ball" style="width:100px;height:100px;left:30px;bottom:10px;transform:rotate(-8deg)">
    <div class="face" style="top:30px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth smile"></div></div>
    <div class="blush" style="top:38px;left:18px"></div><div class="blush" style="top:38px;right:18px"></div>
  </div>
  <div class="ball" style="width:110px;height:110px;left:160px;bottom:20px">
    <div class="face" style="top:34px"><div class="eyes"><div class="eye"></div><div class="eye wink"></div></div><div class="mouth grin"></div></div>
  </div>
  <div class="ball" style="width:90px;height:90px;left:300px;bottom:5px;transform:rotate(5deg)">
    <div class="face" style="top:26px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth open"></div></div>
  </div>
  <div class="ball" style="width:120px;height:120px;right:220px;bottom:15px;background:linear-gradient(145deg,#fff,#ffd);border:3px solid rgba(26,24,0,.06)">
    <div class="face" style="top:38px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth grin"></div></div>
    <div class="blush" style="top:48px;left:22px"></div><div class="blush" style="top:48px;right:22px"></div>
  </div>
  <div class="ball" style="width:95px;height:95px;right:90px;bottom:8px;transform:rotate(10deg)">
    <div class="face" style="top:28px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth flat"></div></div>
  </div>
  <div class="ball" style="width:70px;height:70px;right:10px;bottom:25px">
    <div class="face" style="top:20px"><div class="eyes" style="gap:4px"><div class="eye" style="width:4px;height:4px"></div><div class="eye" style="width:4px;height:4px"></div></div><div class="mouth smile" style="width:8px;height:4px"></div></div>
  </div>
</div>

</body>
</html>
