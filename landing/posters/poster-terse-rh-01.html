<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Terse RH 01 — Main Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden;background:#d1e847;font-family:'Inter',sans-serif;color:#1a1800}
.canvas{width:960px;height:600px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:40px 48px;display:flex;flex-direction:column;background:#d1e847;border-radius:12px;overflow:hidden}

.header{display:flex;align-items:center;margin-bottom:48px}
.green-dot{width:14px;height:14px;border-radius:50%;background:#fff;margin-right:14px}
.logo{font-size:22px;font-weight:700;letter-spacing:4px;flex:1}
.header-icons{display:flex;gap:20px;color:rgba(0,0,0,.4);font-size:22px}

.section-title{font-size:24px;font-weight:700;margin-bottom:20px}

.empty-card{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04);border-radius:16px;padding:40px;display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:28px}
.t-icon{color:#00C805;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px}
.empty-sub{font-size:15px;color:rgba(0,0,0,.4);margin-bottom:22px}
.add-btn{width:48px;height:48px;border-radius:50%;background:#1a1800;color:#1a1a1a;font-size:28px;font-weight:600;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}

.stats-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border-radius:12px;border:2px solid #00C805;background:transparent;color:#00C805;font-size:17px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-bottom:32px}

.divider-text{text-align:center;color:rgba(0,0,0,.35);font-size:14px;margin-bottom:16px}

.textarea{width:100%;height:160px;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);border-radius:14px;padding:20px;color:rgba(0,0,0,.35);font-size:16px;font-family:'Inter',sans-serif;resize:none;outline:none;margin-bottom:20px}

.optimize-btn{width:100%;padding:18px;border-radius:14px;background:#fff;color:#1a1800;font-size:18px;font-weight:700;font-family:'Inter',sans-serif;border:none;cursor:pointer;letter-spacing:.5px}

.spacer{flex:1}

.bottom-bar{display:flex;align-items:center;gap:16px;padding:18px 24px;background:rgba(0,0,0,.04);border-radius:14px;margin-top:32px}
.badge{background:rgba(0,0,0,.08);color:#00C805;font-size:13px;font-weight:700;padding:6px 14px;border-radius:8px;letter-spacing:1px}
.bottom-text{flex:1;font-size:15px;color:rgba(0,0,0,.4);font-family:'JetBrains Mono',monospace}
.upgrade-btn{padding:10px 24px;border-radius:10px;background:#fff;color:#1a1a1a;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;border:none;cursor:pointer}

.mac-cam{width:7px;height:7px;border-radius:50%;background:radial-gradient(#666,#444);margin:0 auto 7px}
.mac-screen{
  background:#d1e847;border-radius:3px;overflow:hidden;
  padding:28px 32px 24px;
  max-height:700px;overflow-y:auto;
}
.mac-chin{width:88%;margin:0 auto;height:12px;background:linear-gradient(180deg,#3a3a3a,#2a2a2a);border-radius:0 0 6px 6px}
.mac-base{width:104%;margin-left:-2%;height:8px;background:linear-gradient(180deg,#d0d0d0,#b0b0b0,#c0c0c0);border-radius:0 0 8px 8px;box-shadow:0 2px 4px rgba(0,0,0,.06)}
</style>
</head>
<body>
<div class="canvas">
  <div class="header">
    <div class="green-dot"></div>
    <div class="logo">TERSE</div>
    <div class="header-icons"><span>⚙</span><span>✕</span></div>
  </div>

  <div class="section-title">Connected Sessions</div>

  <div class="empty-card">
    <div class="t-icon">T</div>
    <div class="empty-title">No connections yet</div>
    <div class="empty-sub">Click + to connect</div>
    <div class="add-btn">+</div>
  </div>

  <div class="stats-btn">Statistics</div>

  <div class="divider-text">or paste below</div>

  <textarea class="textarea" readonly>Paste a prompt to optimize...</textarea>

  <button class="optimize-btn">Optimize</button>

  <div class="spacer"></div>

  <div class="bottom-bar">
    <div class="badge">FREE</div>
    <div class="bottom-text">1230/1500 left this week</div>
    <button class="upgrade-btn">Upgrade</button>
  </div>
</div>
</body>
</html>
