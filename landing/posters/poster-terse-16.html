<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;background:#FFED29}

.stripe{position:absolute;background:rgba(255,255,255,.55);border-radius:0}
.s1{width:120px;height:100%;top:0;right:160px}
.s2{width:120px;height:100%;top:0;right:320px}
.s3{width:100%;height:120px;bottom:160px;left:0}

.logo{position:absolute;top:50px;right:60px;z-index:20}
.logo .name{font-size:64px;font-weight:900;color:#1a1800;letter-spacing:-2px;line-height:1}

.card{
  position:absolute;top:130px;left:50%;transform:translateX(-50%);
  width:800px;background:#FFED29;border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.18),0 10px 30px rgba(0,0,0,.08);
  z-index:10;overflow:hidden;
}

/* Header */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:rgba(26,24,0,.06);
}
.app-header-left{display:flex;align-items:center;gap:10px}
.green-dot{width:10px;height:10px;border-radius:50%;background:#4ade80}
.app-title{font-size:15px;font-weight:800;color:#1a1800;letter-spacing:1px}
.session-count{font-size:12px;color:rgba(26,24,0,.4);font-weight:500}
.app-header-right{font-size:18px;color:rgba(26,24,0,.4)}

.app-body{padding:24px 28px 20px}

.settings-title{font-size:22px;font-weight:800;color:#1a1800;margin-bottom:20px}

/* Mode selector */
.mode-label{font-size:11px;font-weight:700;color:rgba(26,24,0,.4);letter-spacing:1.5px;margin-bottom:10px}
.mode-selector{
  display:flex;background:rgba(26,24,0,.06);border-radius:12px;overflow:hidden;margin-bottom:24px;
}
.mode-opt{
  flex:1;padding:12px;text-align:center;font-size:14px;font-weight:700;color:rgba(26,24,0,.35);
  cursor:pointer;transition:all .2s;
}
.mode-opt.active{background:#1a1800;color:#FFED29;border-radius:12px}

/* Toggle rows */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid rgba(26,24,0,.06);
}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:15px;font-weight:600;color:#1a1800}
.toggle{
  width:44px;height:26px;border-radius:13px;background:#4ade80;position:relative;
  cursor:pointer;flex-shrink:0;
}
.toggle.off{background:rgba(26,24,0,.12)}
.toggle-knob{
  position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.toggle.off .toggle-knob{right:auto;left:3px}

/* Account section */
.account-section{
  margin-top:20px;padding-top:20px;border-top:2px solid rgba(26,24,0,.08);
}
.account-label{font-size:11px;font-weight:700;color:rgba(26,24,0,.4);letter-spacing:1.5px;margin-bottom:14px}
.account-row{
  display:flex;align-items:center;gap:14px;
}
.avatar{
  width:44px;height:44px;border-radius:50%;background:#1a1800;color:#FFED29;
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;
  flex-shrink:0;
}
.account-info{flex:1}
.account-name{font-size:16px;font-weight:700;color:#1a1800}
.account-email{font-size:12px;color:rgba(26,24,0,.4)}
.signout-btn{
  padding:8px 18px;background:rgba(26,24,0,.08);border:none;border-radius:8px;
  font-size:13px;font-weight:600;color:rgba(26,24,0,.5);cursor:pointer;font-family:inherit;
}

/* Balls */
.balls{position:absolute;bottom:0;left:0;right:0;height:180px;z-index:5;overflow:hidden}
.ball{position:absolute;bottom:-20px;border-radius:50%;background:linear-gradient(145deg,#FFED29,#e8d620);display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a1800;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ball .face{position:absolute;display:flex;flex-direction:column;align-items:center}
.ball .eyes{display:flex;gap:6px}
.ball .eye{width:5px;height:5px;border-radius:50%;background:#1a1800}
.ball .eye.wink{width:7px;height:2px;border-radius:1px;background:#1a1800;margin-top:2px}
.ball .mouth{margin-top:3px}
.ball .mouth.smile{width:10px;height:5px;border-radius:0 0 6px 6px;border:2px solid #1a1800;border-top:0}
.ball .mouth.open{width:8px;height:8px;border-radius:50%;background:#1a1800}
.ball .mouth.flat{width:8px;height:2px;background:#1a1800;border-radius:1px}
.ball .mouth.grin{width:12px;height:6px;border-radius:0 0 8px 8px;background:#1a1800}
.ball .blush{position:absolute;width:6px;height:4px;border-radius:50%;background:#f9a8d4}
</style>
</head>
<body>

<div class="stripe s1"></div>
<div class="stripe s2"></div>
<div class="stripe s3"></div>

<div class="logo">
  <div class="name">Terse</div>
</div>

<div class="card">
  <div class="app-header">
    <div class="app-header-left">
      <div class="green-dot"></div>
      <div class="app-title">TERSE</div>
      <div class="session-count">3 sessions</div>
    </div>
    <div class="app-header-right">✕</div>
  </div>
  <div class="app-body">
    <div class="settings-title">Settings</div>

    <div class="mode-label">AGGRESSIVENESS</div>
    <div class="mode-selector">
      <div class="mode-opt">Light</div>
      <div class="mode-opt active">Balanced</div>
      <div class="mode-opt">Aggressive</div>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">Remove filler words</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Remove politeness</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Remove hedging</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Remove meta-language</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Shorten phrases</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Simplify vocabulary</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Remove redundancy</div>
      <div class="toggle off"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Compress whitespace</div>
      <div class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Compress code</div>
      <div class="toggle off"><div class="toggle-knob"></div></div>
    </div>

    <div class="account-section">
      <div class="account-label">ACCOUNT</div>
      <div class="account-row">
        <div class="avatar">Y</div>
        <div class="account-info">
          <div class="account-name">You</div>
          <div class="account-email">your@email.com</div>
        </div>
        <button class="signout-btn">Sign Out</button>
      </div>
    </div>
  </div>
</div>

<div class="balls">
  <div class="ball" style="width:100px;height:100px;left:30px;bottom:10px;transform:rotate(-8deg)">
    <div class="face" style="top:30px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth smile"></div></div>
    <div class="blush" style="top:38px;left:18px"></div><div class="blush" style="top:38px;right:18px"></div>
  </div>
  <div class="ball" style="width:110px;height:110px;left:160px;bottom:20px">
    <div class="face" style="top:34px"><div class="eyes"><div class="eye"></div><div class="eye wink"></div></div><div class="mouth grin"></div></div>
  </div>
  <div class="ball" style="width:90px;height:90px;left:300px;bottom:5px;transform:rotate(5deg)">
    <div class="face" style="top:26px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth open"></div></div>
  </div>
  <div class="ball" style="width:120px;height:120px;right:220px;bottom:15px;background:linear-gradient(145deg,#fff,#ffd);border:3px solid rgba(26,24,0,.06)">
    <div class="face" style="top:38px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth grin"></div></div>
    <div class="blush" style="top:48px;left:22px"></div><div class="blush" style="top:48px;right:22px"></div>
  </div>
  <div class="ball" style="width:95px;height:95px;right:90px;bottom:8px;transform:rotate(10deg)">
    <div class="face" style="top:28px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth flat"></div></div>
  </div>
  <div class="ball" style="width:70px;height:70px;right:10px;bottom:25px">
    <div class="face" style="top:20px"><div class="eyes" style="gap:4px"><div class="eye" style="width:4px;height:4px"></div><div class="eye" style="width:4px;height:4px"></div></div><div class="mouth smile" style="width:8px;height:4px"></div></div>
  </div>
</div>

</body>
</html>
