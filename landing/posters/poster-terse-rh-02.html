<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Terse RH 02 — Floating Optimizer Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden;background:#d1e847;font-family:'Inter',sans-serif;color:#1a1800}
.canvas{width:960px;height:600px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:40px 48px;display:flex;flex-direction:column;background:#d1e847;border-radius:12px;overflow:hidden}

/* ---- POPUP BAR ---- */
.popup{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.05);border-radius:18px;padding:28px 30px 24px;margin-bottom:40px}
.popup-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.popup-app{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;flex:1;min-width:200px}
.popup-app .dot{width:10px;height:10px;border-radius:50%;background:#1a1800;flex-shrink:0}
.pills{display:flex;gap:0;background:rgba(0,0,0,.04);border-radius:10px;overflow:hidden;font-size:13px;font-weight:600}
.pills .pill{padding:8px 18px;color:rgba(0,0,0,.4);cursor:pointer}
.pills .pill.active{background:#fff;color:#1a1800;border-radius:10px}
.popup-meta{display:flex;align-items:center;gap:20px;font-size:14px;color:rgba(0,0,0,.4);font-family:'JetBrains Mono',monospace;margin-bottom:16px}
.popup-meta .count{color:#00C805;font-weight:600}
.popup-textarea{width:100%;height:100px;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);border-radius:12px;padding:18px;color:#1a1800;font-size:16px;font-family:'Inter',sans-serif;resize:none;outline:none;margin-bottom:16px}
.popup-actions{display:flex;align-items:center;gap:12px}
.btn-capture{padding:12px 24px;border-radius:10px;background:rgba(0,0,0,.05);color:#1a1800;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;border:none;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-replace{padding:12px 24px;border-radius:10px;background:#fff;color:#1a1800;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;border:none;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-copy{width:42px;height:42px;border-radius:10px;background:rgba(0,0,0,.05);color:rgba(0,0,0,.4);font-size:18px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}

/* ---- MINI MAIN WINDOW ---- */
.mini{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04);border-radius:18px;padding:28px 30px 24px;flex:1;display:flex;flex-direction:column}
.mini-header{display:flex;align-items:center;margin-bottom:24px}
.mini .green-dot{width:10px;height:10px;border-radius:50%;background:#1a1800;margin-right:10px}
.mini .logo{font-size:16px;font-weight:700;letter-spacing:3px;flex:1}
.mini .header-icons{display:flex;gap:14px;color:rgba(0,0,0,.35);font-size:16px}
.mini-title{font-size:18px;font-weight:700;margin-bottom:16px}

.mini-empty{background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.03);border-radius:12px;padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:18px}
.mini-t{width:44px;height:44px;border-radius:10px;background:#1a1800;color:#1a1a1a;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.mini-empty-title{font-size:14px;font-weight:600;margin-bottom:4px}
.mini-empty-sub{font-size:12px;color:rgba(0,0,0,.35);margin-bottom:14px}
.mini-add{width:36px;height:36px;border-radius:50%;background:#1a1800;color:#1a1a1a;font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;border:none}

.mini-stats{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:10px;border:1.5px solid #00C805;background:transparent;color:#00C805;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;margin-bottom:14px}
.mini-divider{text-align:center;color:rgba(0,0,0,.3);font-size:12px;margin-bottom:10px}
.mini-textarea{width:100%;height:80px;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.03);border-radius:10px;padding:14px;color:rgba(0,0,0,.3);font-size:13px;font-family:'Inter',sans-serif;resize:none;outline:none;margin-bottom:14px}
.mini-optimize{width:100%;padding:14px;border-radius:10px;background:#fff;color:#1a1800;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;border:none}

.mini-spacer{flex:1}
.mini-bottom{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.03);border-radius:10px;margin-top:16px}
.mini-badge{background:rgba(0,0,0,.08);color:#00C805;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:1px}
.mini-bottom-text{flex:1;font-size:12px;color:rgba(0,0,0,.35);font-family:'JetBrains Mono',monospace}
.mini-upgrade{padding:7px 16px;border-radius:8px;background:#fff;color:#1a1a1a;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;border:none}

.mac-cam{width:7px;height:7px;border-radius:50%;background:radial-gradient(#666,#444);margin:0 auto 7px}
.mac-screen{
  background:#d1e847;border-radius:3px;overflow:hidden;
  padding:28px 32px 24px;
  max-height:700px;overflow-y:auto;
}
.mac-chin{width:88%;margin:0 auto;height:12px;background:linear-gradient(180deg,#3a3a3a,#2a2a2a);border-radius:0 0 6px 6px}
.mac-base{width:104%;margin-left:-2%;height:8px;background:linear-gradient(180deg,#d0d0d0,#b0b0b0,#c0c0c0);border-radius:0 0 8px 8px;box-shadow:0 2px 4px rgba(0,0,0,.06)}
</style>
</head>
<body>
<div class="canvas">

  <!-- POPUP BAR -->
  <div class="popup">
    <div class="popup-header">
      <div class="popup-app">
        <div class="dot"></div>
        <span>App Store Connect - Google C...</span>
      </div>
      <div class="pills">
        <div class="pill">Soft</div>
        <div class="pill active">Normal</div>
        <div class="pill">Aggr</div>
      </div>
      <div style="width:16px"></div>
      <div class="pills">
        <div class="pill">Off</div>
        <div class="pill active">Send</div>
        <div class="pill">Auto</div>
      </div>
    </div>
    <div class="popup-meta">
      <span class="count">685/1500 left</span>
      <span>5 → 5</span>
    </div>
    <textarea class="popup-textarea" readonly>Welcom to Terse! e</textarea>
    <div class="popup-actions">
      <button class="btn-capture">Capture</button>
      <button class="btn-replace">Replace</button>
      <button class="btn-copy">⧉</button>
    </div>
  </div>

  <!-- MINI MAIN WINDOW -->
  <div class="mini">
    <div class="mini-header">
      <div class="green-dot"></div>
      <div class="logo">TERSE</div>
      <div class="header-icons"><span>⚙</span><span>✕</span></div>
    </div>
    <div class="mini-title">Connected Sessions</div>
    <div class="mini-empty">
      <div class="mini-t">T</div>
      <div class="mini-empty-title">No connections yet</div>
      <div class="mini-empty-sub">Click + to connect</div>
      <div class="mini-add">+</div>
    </div>
    <div class="mini-stats">Statistics</div>
    <div class="mini-divider">or paste below</div>
    <textarea class="mini-textarea" readonly>Paste a prompt to optimize...</textarea>
    <button class="mini-optimize">Optimize</button>
    <div class="mini-spacer"></div>
    <div class="mini-bottom">
      <div class="mini-badge">FREE</div>
      <div class="mini-bottom-text">1230/1500 left</div>
      <button class="mini-upgrade">Upgrade</button>
    </div>
  </div>

</div>
</body>
</html>
