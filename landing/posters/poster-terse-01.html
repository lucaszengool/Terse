<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse Poster 1 — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#FFED29;font-family:'Noto Sans SC','Inter',-apple-system,sans-serif;overflow:hidden}
.page{width:100%;height:100%;position:relative;display:flex;flex-direction:column;padding:4vh 5vw}
.counter{position:absolute;top:3vh;right:4vw;width:44px;height:44px;border-radius:50%;background:rgba(26,24,0,.1);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:rgba(26,24,0,.45)}
.title{font-size:clamp(32px,5vw,64px);font-weight:900;color:#1a1800;letter-spacing:-2px;line-height:1.1;margin-bottom:4px}
.subtitle{font-size:clamp(14px,1.8vw,22px);color:rgba(26,24,0,.3);font-weight:500}
.mac-area{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-top:2vh;overflow:visible}
.mac-wrap{width:min(90%,850px);transform:perspective(1200px) rotateY(6deg) rotateX(2deg);transform-origin:40% 100%}
.mac{background:#2d2d2d;border-radius:14px;padding:8px 8px 14px;box-shadow:0 30px 80px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.04),12px 0 40px rgba(0,0,0,.08)}
.mac-screen{background:#FFED29;border-radius:4px;overflow:hidden;padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:380px}
.app-icon{width:64px;height:64px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 3px 12px rgba(0,0,0,.05)}
.app-icon span{font-size:30px;font-weight:900;color:#1a1800}
.app-t{font-size:18px;font-weight:700;color:#1a1800;margin-bottom:4px}
.app-s{font-size:12px;color:rgba(26,24,0,.3);margin-bottom:20px}
.dots{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:240px;margin-bottom:20px}
.dot{width:40px;height:40px;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.btn{padding:10px 32px;background:#fff;border-radius:40px;font-size:14px;font-weight:700;color:#1a1800;box-shadow:0 2px 6px rgba(0,0,0,.04);margin-bottom:8px}
.link{font-size:12px;color:rgba(26,24,0,.3)}
</style>
</head>
<body>
<div class="page">
  <div class="counter">1/6</div>
  <div class="title">欢迎使用 Terse。</div>
  <div class="subtitle">选择风格，登录，开始省钱。</div>
  <div class="mac-area">
    <div class="mac-wrap">
      <div class="mac">
        <div class="mac-screen">
          <div class="app-icon"><span>T</span></div>
          <div class="app-t">Welcome to Terse</div>
          <div class="app-s">Choose your style</div>
          <div class="dots">
            <div class="dot" style="background:#fff;border:2px solid rgba(0,0,0,.08)"></div>
            <div class="dot" style="background:#c4b5fd"></div>
            <div class="dot" style="background:#fca5a5"></div>
            <div class="dot" style="background:#67e8f9"></div>
            <div class="dot" style="background:#1a1800"></div>
            <div class="dot" style="background:#f9a8d4"></div>
            <div class="dot" style="background:#6ee7b7"></div>
            <div class="dot" style="background:#fde68a"></div>
          </div>
          <div class="btn">Sign In</div>
          <div class="link">Create Account</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
