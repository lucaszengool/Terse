<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse — Floating Optimizer Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;background:#FFED29}

.stripe{position:absolute;background:rgba(255,255,255,.55);border-radius:0}
.s1{width:120px;height:100%;top:0;right:160px}
.s2{width:120px;height:100%;top:0;right:320px}
.s3{width:100%;height:120px;bottom:160px;left:0}

.logo{position:absolute;top:50px;right:60px;z-index:20}
.logo .name{font-size:64px;font-weight:900;color:#1a1800;letter-spacing:-2px;line-height:1}

/* Floating card container */
.card{
  position:absolute;top:130px;left:50%;transform:translateX(-50%);
  width:800px;background:#FFED29;border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.18),0 10px 30px rgba(0,0,0,.08);
  z-index:10;overflow:hidden;
}

/* Popup bar */
.popup-bar{
  background:rgba(26,24,0,.92);border-radius:14px;padding:0;margin-bottom:20px;
  color:#fff;overflow:hidden;
}
.popup-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);
}
.popup-app{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);flex:1;min-width:0}
.popup-app .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0}
.popup-app .app-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mode-btns{display:flex;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;margin:0 12px}
.mode-btn{padding:6px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer}
.mode-btn.active{background:rgba(255,255,255,.2);color:#fff}
.auto-btns{display:flex;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.auto-btn{padding:6px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.4)}
.auto-btn.active{background:rgba(255,255,255,.2);color:#fff}

.popup-meta{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;font-size:12px;color:rgba(255,255,255,.4);
}
.popup-meta .usage{font-family:'JetBrains Mono',monospace}
.popup-meta .tokens{font-family:'JetBrains Mono',monospace}

.popup-textarea{
  margin:0 12px 12px;padding:12px 14px;
  background:rgba(60,70,20,.25);border-radius:10px;border:none;
  font-size:14px;color:rgba(255,255,255,.7);width:calc(100% - 24px);
  height:44px;resize:none;font-family:inherit;
}

.popup-actions{
  display:flex;align-items:center;gap:10px;padding:0 12px 14px;
}
.capture-btn{
  flex:1;padding:10px;background:rgba(255,255,255,.1);border:none;border-radius:10px;
  font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;
}
.replace-btn{
  flex:1;padding:10px;background:#4ade80;border:none;border-radius:10px;
  font-size:14px;font-weight:700;color:#1a1800;cursor:pointer;font-family:inherit;
}
.copy-icon{
  width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.6);
  flex-shrink:0;
}

/* Main window (smaller) */
.main-win{
  background:rgba(26,24,0,.04);border-radius:14px;overflow:hidden;
}
.mw-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;background:rgba(26,24,0,.06);
}
.mw-header-left{display:flex;align-items:center;gap:8px}
.mw-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
.mw-title{font-size:13px;font-weight:800;color:#1a1800;letter-spacing:1px}
.mw-icons{font-size:14px;color:rgba(26,24,0,.3)}
.mw-body{padding:16px 18px 14px}
.mw-section{font-size:15px;font-weight:800;color:#1a1800;margin-bottom:10px}
.mw-empty{
  display:flex;flex-direction:column;align-items:center;padding:16px;
  background:rgba(26,24,0,.04);border-radius:10px;margin-bottom:10px;
}
.mw-t{
  width:32px;height:32px;border-radius:8px;background:#1a1800;color:#FFED29;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;
  margin-bottom:6px;
}
.mw-empty-t{font-size:12px;font-weight:600;color:#1a1800}
.mw-empty-s{font-size:11px;color:rgba(26,24,0,.4)}
.mw-stats-btn{
  width:100%;padding:10px;background:rgba(26,24,0,.06);border:none;border-radius:10px;
  font-size:13px;font-weight:700;color:#1a1800;margin-bottom:10px;font-family:inherit;
}
.mw-paste{
  width:100%;height:50px;background:rgba(60,70,20,.1);border:none;border-radius:10px;
  padding:10px;font-size:12px;color:rgba(60,70,20,.5);resize:none;margin-bottom:10px;font-family:inherit;
}
.mw-opt-btn{
  width:100%;padding:10px;background:#fff;border:none;border-radius:10px;
  font-size:13px;font-weight:700;color:#1a1800;font-family:inherit;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.mw-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;background:rgba(26,24,0,.04);
}
.mw-free{
  padding:4px 10px;background:rgba(26,24,0,.08);border-radius:6px;
  font-size:11px;font-weight:700;color:#1a1800;
}
.mw-usage{font-size:11px;color:rgba(26,24,0,.4)}
.mw-upgrade{
  padding:5px 12px;background:#1a1800;color:#FFED29;border:none;border-radius:6px;
  font-size:11px;font-weight:700;font-family:inherit;
}

/* Balls */
.balls{position:absolute;bottom:0;left:0;right:0;height:180px;z-index:5;overflow:hidden}
.ball{position:absolute;bottom:-20px;border-radius:50%;background:linear-gradient(145deg,#FFED29,#e8d620);display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a1800;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ball .face{position:absolute;display:flex;flex-direction:column;align-items:center}
.ball .eyes{display:flex;gap:6px}
.ball .eye{width:5px;height:5px;border-radius:50%;background:#1a1800}
.ball .eye.wink{width:7px;height:2px;border-radius:1px;background:#1a1800;margin-top:2px}
.ball .mouth{margin-top:3px}
.ball .mouth.smile{width:10px;height:5px;border-radius:0 0 6px 6px;border:2px solid #1a1800;border-top:0}
.ball .mouth.open{width:8px;height:8px;border-radius:50%;background:#1a1800}
.ball .mouth.flat{width:8px;height:2px;background:#1a1800;border-radius:1px}
.ball .mouth.grin{width:12px;height:6px;border-radius:0 0 8px 8px;background:#1a1800}
.ball .blush{position:absolute;width:6px;height:4px;border-radius:50%;background:#f9a8d4}
</style>
</head>
<body>

<div class="stripe s1"></div>
<div class="stripe s2"></div>
<div class="stripe s3"></div>

<div class="logo">
  <div class="name">Terse</div>
</div>

<div class="card">
  <!-- Popup bar -->
  <div class="popup-bar">
    <div class="popup-top">
      <div class="popup-app">
        <div class="dot"></div>
        <div class="app-name">App Store Connect - Google C...</div>
      </div>
      <div class="mode-btns">
        <div class="mode-btn">Soft</div>
        <div class="mode-btn active">Normal</div>
        <div class="mode-btn">Aggr</div>
      </div>
      <div class="auto-btns">
        <div class="auto-btn active">Off</div>
        <div class="auto-btn">Send</div>
        <div class="auto-btn">Auto</div>
      </div>
    </div>
    <div class="popup-meta">
      <span class="usage">685/1500 left</span>
      <span class="tokens">5 → 5</span>
    </div>
    <textarea class="popup-textarea" readonly>Welcom to Terse! e</textarea>
    <div class="popup-actions">
      <button class="capture-btn">Capture</button>
      <button class="replace-btn">Replace</button>
      <div class="copy-icon">⧉</div>
    </div>
  </div>

  <!-- Main window (smaller) -->
  <div class="main-win">
    <div class="mw-header">
      <div class="mw-header-left">
        <div class="mw-dot"></div>
        <div class="mw-title">TERSE</div>
      </div>
      <div class="mw-icons">⚙ ✕</div>
    </div>
    <div class="mw-body">
      <div class="mw-section">Connected Sessions</div>
      <div class="mw-empty">
        <div class="mw-t">T</div>
        <div class="mw-empty-t">No connections yet</div>
        <div class="mw-empty-s">Click + to connect to a chat input</div>
      </div>
      <button class="mw-stats-btn">Statistics</button>
      <textarea class="mw-paste" readonly>Paste a prompt to optimize...</textarea>
      <button class="mw-opt-btn">Optimize</button>
    </div>
    <div class="mw-bottom">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="mw-free">FREE</div>
        <div class="mw-usage">1230/1500 left this week</div>
      </div>
      <button class="mw-upgrade">Upgrade</button>
    </div>
  </div>
</div>

<div class="balls">
  <div class="ball" style="width:100px;height:100px;left:30px;bottom:10px;transform:rotate(-8deg)">
    <div class="face" style="top:30px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth smile"></div></div>
    <div class="blush" style="top:38px;left:18px"></div><div class="blush" style="top:38px;right:18px"></div>
  </div>
  <div class="ball" style="width:110px;height:110px;left:160px;bottom:20px">
    <div class="face" style="top:34px"><div class="eyes"><div class="eye"></div><div class="eye wink"></div></div><div class="mouth grin"></div></div>
  </div>
  <div class="ball" style="width:90px;height:90px;left:300px;bottom:5px;transform:rotate(5deg)">
    <div class="face" style="top:26px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth open"></div></div>
  </div>
  <div class="ball" style="width:120px;height:120px;right:220px;bottom:15px;background:linear-gradient(145deg,#fff,#ffd);border:3px solid rgba(26,24,0,.06)">
    <div class="face" style="top:38px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth grin"></div></div>
    <div class="blush" style="top:48px;left:22px"></div><div class="blush" style="top:48px;right:22px"></div>
  </div>
  <div class="ball" style="width:95px;height:95px;right:90px;bottom:8px;transform:rotate(10deg)">
    <div class="face" style="top:28px"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth flat"></div></div>
  </div>
  <div class="ball" style="width:70px;height:70px;right:10px;bottom:25px">
    <div class="face" style="top:20px"><div class="eyes" style="gap:4px"><div class="eye" style="width:4px;height:4px"></div><div class="eye" style="width:4px;height:4px"></div></div><div class="mouth smile" style="width:8px;height:4px"></div></div>
  </div>
</div>

</body>
</html>
