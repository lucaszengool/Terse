<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terse – Pet Unlocked!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f6ff;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 24px;
  }
  .card {
    background: #fff; border-radius: 24px; padding: 40px 32px;
    max-width: 360px; width: 100%;
    box-shadow: 0 8px 40px rgba(80,60,180,.12);
    animation: pop .4s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop { from { opacity:0; transform:scale(.85) translateY(20px) } to { opacity:1; transform:none } }
  .emoji { font-size: 64px; display:block; margin-bottom: 16px; animation: bounce 1s ease-in-out infinite alternate; }
  @keyframes bounce { from { transform:translateY(0) } to { transform:translateY(-10px) } }
  h1 { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
  p  { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 24px; }
  .btn {
    display: inline-block; background: #22a559; color: #fff;
    font-size: 14px; font-weight: 700; padding: 12px 28px;
    border-radius: 12px; text-decoration: none; cursor: pointer;
    border: none; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .note { font-size: 12px; color: #aaa; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <span class="emoji">🎉</span>
  <h1>Pet Unlocked!</h1>
  <p>Your new Terse Pal is ready.<br>Switch back to Terse — it should appear in your Pals collection.</p>
  <button class="btn" onclick="window.close()">Back to Terse</button>
  <div class="note">You can close this tab.</div>
</div>
</body>
</html>
